<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Student Archive — Studio</title>
  <meta name="description" content="2025년 2학기 공간프로그램분석 학생 작품 아카이브"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="seasonal.css"/>
  <script src="seasonal.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;
  --white:#0a0a0c;
  --black:#ffffff;
  --mid:#8b8b99;
  --line:#262630;
  --accent:#00e5ff;
  --accent-hover:#00b3cc;
  --accent-rgb: 0, 229, 255;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'Roboto Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  background:var(--bg);color:var(--black);font-family:var(--sans);overflow-x:hidden;
  background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:40px 40px;background-position:-1px -1px;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:48px;
  background:rgba(10,10,12,.8);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 max(2rem,3vw);
}
.nav-inner{
  width:100%;max-width:1400px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{font-size:.8rem;font-weight:600;letter-spacing:-.01em;color:var(--black);text-decoration:none}
.nav-center{font-size:.75rem;font-weight:400;color:var(--mid)}
.nav-back{
  font-size:.75rem;font-weight:400;color:var(--accent);
  text-decoration:none;transition:opacity .2s;
}
.nav-back:hover{opacity:.7}

/* ── HERO ── */
.hero{
  padding:7rem max(2rem,3vw) 4rem;
  max-width:1400px;margin:0 auto;
}
.hero-tag{
  font-size:.72rem;font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;color:var(--accent);font-family:var(--mono);
  margin-bottom:1.25rem;display:inline-block;
  border:1px solid var(--accent);padding:.2rem .6rem;border-radius:4px;
}
.hero-title{
  font-size:clamp(2.8rem,6vw,5rem);
  font-weight:600;letter-spacing:-.03em;
  color:var(--black);line-height:1.05;
  margin-bottom:1rem;text-shadow:0 0 20px rgba(255,255,255,.1);
}
.hero-sub{
  font-size:1rem;font-weight:300;color:var(--mid);font-family:var(--mono);
  margin-bottom:2.5rem;letter-spacing:.01em;
}
.hero-chips{display:flex;gap:.5rem;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;gap:.35rem;
  font-size:.72rem;font-weight:500;letter-spacing:-.01em;
  background:rgba(255,255,255,.05);color:var(--mid);
  border:1px solid var(--line);
  padding:.35rem .85rem;border-radius:4px;font-family:var(--mono);
}
.chip-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}

/* ── FILTER / CONTROL BAR ── */
.ctrl-bar{
  position:sticky;top:48px;z-index:150;
  background:rgba(10,10,12,.8);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line);
  padding:0 max(2rem,3vw);
}
.ctrl-inner{
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:44px;
}
.seg{
  display:inline-flex;background:rgba(255,255,255,.05);
  border-radius:6px;padding:3px;gap:2px;border:1px solid var(--line);
}
.stab{
  background:none;border:none;font-family:var(--mono);
  font-size:.72rem;font-weight:500;color:var(--mid);
  padding:.3rem .85rem;border-radius:4px;cursor:pointer;
  transition:all .18s;
  white-space:nowrap;
}
.stab.on{
  background:var(--accent);color:#000;
  box-shadow:0 0 10px rgba(0,229,255,.4);
}
.ctrl-count{font-size:.72rem;color:var(--accent);font-family:var(--mono)}

/* ── GRID ── */
.grid-outer{padding:1.5rem max(2rem,3vw) 6rem;max-width:1400px;margin:0 auto}
.student-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}

/* ── CARD ── */
.s-card{
  background:rgba(20,20,25,.6);backdrop-filter:blur(10px);
  border-radius:8px;overflow:hidden;border:1px solid var(--line);
  cursor:pointer;
  transition:transform .3s var(--ease),box-shadow .3s var(--ease),border-color .3s;
  will-change:transform;
}
.s-card:hover{
  transform:translateY(-4px);border-color:var(--accent);
  box-shadow:0 12px 32px rgba(0,229,255,.15);
}
.s-thumb{
  width:100%;aspect-ratio:3/2;overflow:hidden;
  background:var(--bg);position:relative;
}
.s-thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s var(--ease);
}
.s-card:hover .s-thumb img{transform:scale(1.04)}
.s-thumb-ph{
  width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;background:var(--bg);
}
.s-initial{font-size:3.5rem;font-weight:600;letter-spacing:-.04em;color:var(--line)}
.feat-badge{
  position:absolute;top:.75rem;left:.75rem;
  background:var(--accent);color:#000;
  font-size:.58rem;font-weight:600;font-family:var(--mono);
  letter-spacing:.08em;text-transform:uppercase;
  padding:.22rem .6rem;border-radius:4px;
}

.s-body{padding:1rem 1.25rem 1.25rem}
.s-row{display:flex;align-items:baseline;justify-content:space-between;gap:.4rem;margin-bottom:.5rem}
.s-name{font-size:1.05rem;font-weight:600;letter-spacing:-.02em;color:var(--black)}
.s-num{font-size:.65rem;font-weight:500;color:var(--accent);font-family:var(--mono)}
.s-pills{display:flex;gap:.3rem;flex-wrap:wrap}
.pill{
  font-size:.62rem;font-weight:500;letter-spacing:.01em;font-family:var(--mono);
  background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.3);
  border-radius:4px;padding:.15rem .55rem;
}
.pill.gray{background:rgba(255,255,255,.05);color:var(--mid);border-color:var(--line)}
.s-proj{margin-top:.4rem;font-size:.72rem;color:var(--mid);font-weight:300;font-family:var(--mono)}

/* ── LIGHTBOX (slide from right) ── */
.lb{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity .25s var(--ease);
  display:flex;justify-content:flex-end;
}
.lb.open{opacity:1;pointer-events:all}
.lb-sheet{
  width:min(680px,96%);height:100vh;
  background:var(--bg);overflow-y:auto;border-left:1px solid var(--line);
  transform:translateX(100%);
  transition:transform .32s var(--ease);
  display:flex;flex-direction:column;
}
.lb.open .lb-sheet{transform:translateX(0)}

/* lb header */
.lb-bar{
  position:sticky;top:0;z-index:10;
  background:rgba(10,10,12,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.75rem;height:52px;flex-shrink:0;
}
.lb-nav{display:flex;gap:.4rem}
.lb-btn{
  background:rgba(255,255,255,.05);border:1px solid var(--line);
  border-radius:4px;font-family:var(--mono);
  font-size:.72rem;font-weight:500;color:var(--mid);
  padding:.35rem .9rem;cursor:pointer;
  transition:all .18s;
}
.lb-btn:hover{background:rgba(0,229,255,.1);color:var(--accent);border-color:var(--accent)}
.lb-close{
  width:28px;height:28px;border-radius:4px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:var(--mid);transition:all .18s;
}
.lb-close:hover{background:rgba(0,229,255,.1);color:var(--accent);border-color:var(--accent)}

/* lb body */
.lb-body{padding:2rem 1.75rem 4rem;flex:1}
.lb-eyebrow{font-size:.65rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-family:var(--mono);margin-bottom:.5rem}
.lb-name{font-size:2.4rem;font-weight:600;letter-spacing:-.03em;color:var(--black);margin-bottom:1.5rem;line-height:1.1;text-shadow:0 0 10px rgba(255,255,255,.1)}
.lb-metas{display:flex;gap:1.5rem;flex-wrap:wrap;padding-bottom:1.5rem;border-bottom:1px solid var(--line);margin-bottom:1.75rem}
.lb-meta{display:flex;flex-direction:column;gap:.2rem}
.lb-ml{font-size:.62rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);font-family:var(--mono)}
.lb-mv{font-size:.85rem;font-weight:400;color:var(--black);font-family:var(--mono)}
.lb-sec{margin-bottom:1.75rem}
.lb-sl{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-family:var(--mono);margin-bottom:.75rem}
.lb-img{width:100%;display:block;border-radius:12px;border:1px solid var(--line)}
.lb-duo{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.lb-duo-cell{border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.lb-duo-cell img{width:100%;display:block;object-fit:cover;aspect-ratio:4/3}
.lb-duo-lbl{font-size:.6rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);padding:.5rem .75rem}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--line);
  padding:1.5rem max(2rem,3vw);
  display:flex;justify-content:space-between;align-items:center;
  max-width:1400px;margin:0 auto;
}
.f-copy{font-size:.72rem;color:var(--mid)}
.f-back{font-size:.78rem;font-weight:500;color:var(--accent);text-decoration:none;transition:opacity .2s}
.f-back:hover{opacity:.7}

@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.s-card{animation:cardIn .4s var(--ease) both}

@media(max-width:1100px){.student-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){
  .hero-title{font-size:2.4rem}
  .student-grid{grid-template-columns:1fr}
  .lb-sheet{width:100%}
  .lb-duo{grid-template-columns:1fr}
  .nav-center{display:none}
}
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Studio</a>
    <span class="nav-center">Student Archive</span>
    <a href="index.html" class="nav-back">← Portfolio</a>
  </div>
</nav>

<section class="hero" style="position:relative;overflow:hidden">
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,var(--season-grad-1,transparent) 0%,transparent 50%,var(--season-grad-2,transparent) 100%);opacity:.3;pointer-events:none;transition:background 1s ease"></div>
  <p class="hero-tag">Teaching · 2025년 2학기</p>
  <h1 class="hero-title">공간프로그램분석<br/>학생 아카이브</h1>
  <p class="hero-sub">동양미래대학교 · 공간디자인학과 · Spatial Programme Analysis</p>
  <div class="hero-chips">
    <span class="chip"><span class="chip-dot"></span>22 Students</span>
    <span class="chip">2025년 2학기</span>
    <span class="chip">DMU</span>
  </div>
</section>

<div class="ctrl-bar">
  <div class="ctrl-inner">
    <div class="seg">
      <button class="stab on" data-f="all">All</button>
      <button class="stab" data-f="space">공간프로그램분석</button>
      <button class="stab" data-f="final">Final Exam</button>
    </div>
    <span class="ctrl-count" id="fcount">22 students</span>
  </div>
</div>

<div class="grid-outer">
  <div class="student-grid" id="grid"></div>
</div>

<footer>
  <span class="f-copy">© 2025년 2학기 · 동양미래대학교 · 공간디자인학과</span>
  <a href="index.html" class="f-back">← 포트폴리오 홈</a>
</footer>

<div class="lb" id="lb">
  <div class="lb-sheet" id="lbSheet">
    <div class="lb-bar">
      <div class="lb-nav">
        <button class="lb-btn" id="lbPrev">← Prev</button>
        <button class="lb-btn" id="lbNext">Next →</button>
      </div>
      <button class="lb-close" id="lbClose" aria-label="닫기">✕</button>
    </div>
    <div class="lb-body" id="lbBody"></div>
  </div>
</div>

<script>
const D=[
  {name:'백혁',  n:'01',feat:true, space:'space_백혁.png',  final:'final_백혁.png',  main:'main_백혁.jpg',   proj:'Passage of the Wind'},
  {name:'송서현',n:'02',feat:true, space:'space_송서현.png',final:'final_송서현.png',main:'main_송서현.jpg'},
  {name:'이윤규',n:'03',space:'space_이윤규.png',  final:'final_이윤규.png'},
  {name:'이대형',n:'04',space:'space_이대형.png',  final:'final_이대형.png'},
  {name:'정예빈',n:'05',space:'space_정예빈.png',  final:'final_정예빈.png'},
  {name:'김다연',n:'06',space:'space_김다연.png',  final:'final_김다연.png'},
  {name:'주현지',n:'07',space:'space_주현지.png',  final:'final_주현지.png'},
  {name:'송하링',n:'08',space:'space_송하링.png'},
  {name:'최지혜',n:'09',space:'space_최지혜.png',  final:'final_최지혜.png'},
  {name:'김규리',n:'10',space:'space_김규리.png',  final:'final_김규리.png'},
  {name:'양유정',n:'11',space:'space_양유정.png',  final:'final_양유정.png'},
  {name:'김효리',n:'12',space:'space_김효리.png',  final:'final_김효리.png'},
  {name:'안정은',n:'13',space:'space_안정은.png',  final:'final_안정은.png'},
  {name:'김도훈',n:'14',space:'space_김도훈.png',  final:'final_김도훈.png'},
  {name:'이민석',n:'15',space:'space_이민석.png',  final:'final_이민석.png'},
  {name:'정지원',n:'16',space:'space_정지원.png',  final:'final_정지원.png'},
  {name:'심예빈',n:'17',space:'space_심예빈.png',  final:'final_심예빈.png'},
  {name:'조예나',n:'18',space:'space_조예나.png',  final:'final_조예나.png'},
  {name:'서채린',n:'19',space:'space_서채린.png',  final:'final_서채린.png'},
  {name:'이승하',n:'20',space:'space_이승하.png',  final:'final_이승하.png'},
  {name:'이정은',n:'21',space:'space_이정은.png',  final:'final_이정은.png'},
  {name:'김가인',n:'22',space:'space_김가인.png',  final:'final_김가인.png'},
];
const P='assets/images/students/';
const thumb=s=>P+(s.main||s.final||s.space||'');

const grid=document.getElementById('grid');
let vis=[...D],lbIdx=0;

function buildGrid(f){
  vis=f==='space'?D.filter(s=>s.space):f==='final'?D.filter(s=>s.final):[...D];
  document.getElementById('fcount').textContent=vis.length+' students';
  grid.innerHTML='';
  vis.forEach((s,i)=>{
    const el=document.createElement('article');
    el.className='s-card';
    el.style.animationDelay=i*.03+'s';
    el.innerHTML=`
      <div class="s-thumb">
        <img src="${thumb(s)}" alt="${s.name}" loading="lazy"
          onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\\'s-thumb-ph\\'><span class=\\'s-initial\\'>${s.name[0]}</span></div>'">
        ${s.feat?'<span class="feat-badge">Featured</span>':''}
      </div>
      <div class="s-body">
        <div class="s-row">
          <p class="s-name">${s.name}</p>
          <span class="s-num">${s.n}</span>
        </div>
        <div class="s-pills">
          ${s.space?'<span class="pill">공간분석</span>':''}
          ${s.final?'<span class="pill">Final Exam</span>':''}
        </div>
        ${s.proj?`<p class="s-proj">${s.proj}</p>`:''}
      </div>`;
    el.addEventListener('click',()=>openLb(i));
    grid.appendChild(el);
  });
}
buildGrid('all');

document.querySelectorAll('.stab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');buildGrid(b.dataset.f);
  });
});

const lb=document.getElementById('lb');
const mi=(src,cls='lb-img')=>`<img src="${P+src}" class="${cls}" loading="lazy"
  onerror="this.closest('.lb-sec')&&(this.closest('.lb-sec').style.display='none')">`;

function openLb(i){
  lbIdx=i;const s=vis[i];
  let h=`
    <p class="lb-eyebrow">${s.n} / ${vis.length}</p>
    <h2 class="lb-name">${s.name}</h2>
    <div class="lb-metas">
      <div class="lb-meta"><span class="lb-ml">Course</span><span class="lb-mv">공간프로그램분석</span></div>
      <div class="lb-meta"><span class="lb-ml">Semester</span><span class="lb-mv">2025년 2학기</span></div>
      <div class="lb-meta"><span class="lb-ml">School</span><span class="lb-mv">동양미래대학교</span></div>
      ${s.proj?`<div class="lb-meta"><span class="lb-ml">Project</span><span class="lb-mv">${s.proj}</span></div>`:''}
    </div>`;
  if(s.main)h+=`<div class="lb-sec"><p class="lb-sl">Main Render</p>${mi(s.main)}</div>`;
  if(s.space&&s.final){
    h+=`<div class="lb-sec"><p class="lb-sl">공간분석 &amp; Final Exam</p>
      <div class="lb-duo">
        <div class="lb-duo-cell">${mi(s.space,'')}<p class="lb-duo-lbl">공간프로그램분석</p></div>
        <div class="lb-duo-cell">${mi(s.final,'')}<p class="lb-duo-lbl">Final Exam</p></div>
      </div></div>`;
  }else if(s.space){
    h+=`<div class="lb-sec"><p class="lb-sl">공간프로그램분석</p>${mi(s.space)}</div>`;
  }else if(s.final){
    h+=`<div class="lb-sec"><p class="lb-sl">Final Exam</p>${mi(s.final)}</div>`;
  }
  document.getElementById('lbBody').innerHTML=h;
  document.getElementById('lbSheet').scrollTop=0;
  lb.classList.add('open');document.body.style.overflow='hidden';
}
function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}
function step(d){lbIdx=(lbIdx+d+vis.length)%vis.length;openLb(lbIdx);}
document.getElementById('lbClose').onclick=closeLb;
document.getElementById('lbPrev').onclick=()=>step(-1);
document.getElementById('lbNext').onclick=()=>step(1);
lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
document.addEventListener('keydown',e=>{
  if(!lb.classList.contains('open'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')step(-1);
  if(e.key==='ArrowRight')step(1);
});
</script>
</body>
</html>
