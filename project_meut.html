<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Meut (믓) — Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    /* Cargo Detail Brutalist Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f0;
      --black: #050505;
      --accent: #ff2a00;
      --mono: 'Courier New', Courier, monospace;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --serif: 'Times New Roman', Times, serif;
    }
    body { background: var(--bg); color: var(--black); font-family: var(--sans); display: flex; overflow-x: hidden; }
    
    /* Left Panel: Fixed Metadata */
    .detail-aside {
      position: fixed; top: 0; left: 0; width: 35vw; height: 100vh;
      border-right: 1px solid var(--black);
      padding: 3rem 2rem; display: flex; flex-direction: column; justify-content: space-between;
      background: var(--bg); z-index: 10;
    }
    .detail-close {
      text-decoration: none; color: var(--black); font-weight: 900; font-size: 2rem;
      align-self: flex-start; margin-bottom: 2rem; display: inline-block;
      transition: color 0.2s; text-transform: uppercase;
    }
    .detail-close:hover { color: var(--accent); }
    
    .detail-title {
      font-size: clamp(3rem, 6vw, 7rem); font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase;
      line-height: 0.9; margin-bottom: 2rem; word-break: break-all;
    }
    
    .meta-list { list-style: none; border-top: 1px solid var(--black); margin-bottom: 2rem; }
    .meta-list li {
      display: flex; justify-content: space-between; padding: 1.2rem 0; border-bottom: 1px solid var(--black);
      font-family: var(--mono); font-size: 0.85rem; text-transform: uppercase;
    }
    .meta-label { font-weight: 700; }
    
    .detail-desc {
      font-family: var(--serif); font-size: 1.15rem; line-height: 1.6; padding-right: 1rem;
    }

    /* Right Panel: Scrollable Media */
    .detail-main {
      margin-left: 35vw; width: 65vw; min-height: 100vh; background: var(--black);
    }
    
    /* Image Stack */
    .media-img {
      width: 100%; display: block; border-bottom: 1px solid var(--black);
      filter: grayscale(20%); transition: filter 0.4s;
    }
    .media-img:hover { filter: grayscale(0%); }

    /* Mobile Responsive */
    @media (max-width: 800px) {
      body { flex-direction: column; }
      .detail-aside {
        position: static; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--black);
      }
      .detail-main { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <aside class="detail-aside">
    <div>
      <a href="index.html#works" class="detail-close">← BACK</a>
      <h1 class="detail-title">Meut<br>(믓)</h1>
      
      <ul class="meta-list">
        <li><span class="meta-label">Category</span><span>Sculpture / Public Art</span></li>
        <li><span class="meta-label">Context</span><span>Library Installation</span></li>
        <li><span class="meta-label">Year</span><span>2024</span></li>
      </ul>
      
      <p class="detail-desc">
        미니멀 서페이스(Minimal Surface) 기하학과 피라미드, 역피라미드의 결합을 탐구한 조형 작업입니다. 도서관 내 공공미술 프로젝트로 진행되었으며, 수학적 구조가 만들어내는 긴장감과 형태적 아름다움을 공간 속에 구현했습니다.
      </p>
    </div>
  </aside>

  <main class="detail-main">
    <img src="assets/meut/meut_1.jpeg" alt="Meut 1" class="media-img">
    <img src="assets/meut/meut_2.jpeg" alt="Meut 2" class="media-img">
    <img src="assets/meut/meut_3.jpeg" alt="Meut 3" class="media-img">
    <img src="assets/meut/meut_4.jpeg" alt="Meut 4" class="media-img">
    <img src="assets/meut/meut_5.jpeg" alt="Meut 5" class="media-img">
    <img src="assets/meut/meut_6.jpeg" alt="Meut 6" class="media-img">
    <img src="assets/meut/meut_7.jpeg" alt="Meut 7" class="media-img">
    <img src="assets/meut/meut_8.jpeg" alt="Meut 8" class="media-img">
    <img src="assets/meut/meut_9.jpeg" alt="Meut 9" class="media-img">
    <img src="assets/meut/meut_10.jpeg" alt="Meut 10" class="media-img">
    <img src="assets/meut/meut_11.jpeg" alt="Meut 11" class="media-img">
    <img src="assets/meut/meut_12.jpeg" alt="Meut 12" class="media-img">
    <img src="assets/meut/meut_13.jpeg" alt="Meut 13" class="media-img">
    <img src="assets/meut/meut_14.jpeg" alt="Meut 14" class="media-img">
  </main>

</body>
</html>
